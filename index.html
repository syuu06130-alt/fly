<div id="gw" style="position:relative;width:100%;height:520px;background:#030810;border-radius:var(--border-radius-lg);overflow:hidden;font-family:var(--font-sans);">
  <canvas id="gc" style="display:block;width:100%;height:100%;"></canvas>

  <!-- HUD left -->
  <div id="hud" style="display:none;position:absolute;top:12px;left:14px;color:#fff;font-size:13px;line-height:1.8;pointer-events:none;text-shadow:0 1px 4px rgba(0,0,0,.8);">
    <div>レベル <span id="lvl">0</span> / 15</div>
    <div style="font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;">WASD / 矢印 : 移動</div>
  </div>

  <!-- Score top-right -->
  <div id="scd" style="display:none;position:absolute;top:12px;right:14px;color:#fff;font-size:13px;text-align:right;text-shadow:0 1px 4px rgba(0,0,0,.8);pointer-events:none;">
    スコア<br><span id="scv" style="font-size:22px;font-weight:500;">0</span>
  </div>

  <!-- Settings gear button (always visible, above overlay) -->
  <button id="setgear" style="position:absolute;bottom:14px;right:14px;width:34px;height:34px;border-radius:8px;border:1.5px solid rgba(255,255,255,.3);background:rgba(0,0,0,.45);color:#fff;font-size:17px;cursor:pointer;line-height:1;backdrop-filter:blur(4px);z-index:10;" title="設定">⚙</button>

  <!-- Settings panel (above overlay) -->
  <div id="setpanel" style="display:none;position:absolute;bottom:56px;right:14px;width:220px;background:rgba(10,14,26,.95);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:16px;color:#fff;font-size:13px;backdrop-filter:blur(8px);box-shadow:0 4px 24px rgba(0,0,0,.6);z-index:10;">
    <div style="font-size:12px;font-weight:600;letter-spacing:1px;color:#aabbdd;margin-bottom:12px;">⚙ 設定</div>

    <!-- Speed -->
    <div style="margin-bottom:14px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span>落下速度</span>
        <span id="speedLabel" style="color:#88ccff;font-weight:600;">×0.10</span>
      </div>
      <input id="speedSlider" type="range" min="1" max="250" step="1" value="10"
        style="width:100%;accent-color:#66aaff;cursor:pointer;">
      <div style="display:flex;justify-content:space-between;font-size:10px;color:#556;margin-top:2px;">
        <span>ゆっくり</span><span>速い</span>
      </div>
    </div>

    <!-- Map mode -->
    <div>
      <div style="font-size:12px;color:#aabbdd;margin-bottom:8px;">マップモード</div>
      <div style="display:flex;gap:8px;">
        <button id="btnFixed" onclick="setMapMode('fixed')"
          style="flex:1;padding:6px 0;font-size:12px;border-radius:6px;border:1.5px solid #66aaff;background:#1a3060;color:#88ccff;cursor:pointer;">固定 (15 LV)</button>
        <button id="btnRandom" onclick="setMapMode('random')"
          style="flex:1;padding:6px 0;font-size:12px;border-radius:6px;border:1px solid rgba(255,255,255,.2);background:transparent;color:#aaa;cursor:pointer;">ランダム</button>
      </div>
    </div>
  </div>

  <!-- Countdown overlay -->
  <div id="cdov" style="display:none;position:absolute;top:0;left:0;right:0;bottom:0;pointer-events:none;display:none;align-items:center;justify-content:center;">
    <div id="cdnum" style="font-size:96px;font-weight:700;color:#fff;text-shadow:0 0 40px rgba(100,180,255,.9),0 2px 8px rgba(0,0,0,.8);opacity:1;transition:none;"></div>
  </div>

  <!-- Start / result overlay -->
  <div id="ov" style="position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(3,8,16,.9);color:#fff;text-align:center;padding:20px;">
    <div style="font-size:28px;font-weight:500;letter-spacing:2px;margin-bottom:6px;">THE DROPPER</div>
    <div style="font-size:13px;color:#99aacc;margin-bottom:6px;">穴を通り抜けてゴールを目指せ！</div>
    <div style="font-size:12px;color:#556;line-height:1.9;margin-bottom:24px;">WASD / 矢印キーで左右前後に移動<br>黄色い穴を通過 → プラットフォームに当たると即死</div>
    <button id="btn" style="padding:10px 32px;font-size:14px;cursor:pointer;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;letter-spacing:1px;">スタート</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
const wrap=document.getElementById('gw');
const canvas=document.getElementById('gc');
const W=wrap.clientWidth||680, H=wrap.clientHeight||520;
const renderer=new THREE.WebGLRenderer({canvas,antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(W,H);

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x020508);

const cam=new THREE.PerspectiveCamera(68,W/H,0.1,300);
scene.add(new THREE.AmbientLight(0xffffff,.75));
const dl=new THREE.DirectionalLight(0xffffff,.6);
dl.position.set(5,10,5); scene.add(dl);
const dl2=new THREE.DirectionalLight(0x8888ff,.3);
dl2.position.set(-5,5,-5); scene.add(dl2);

const SHAFT_R=9, LEVELS=15, LH=18, TOP=LEVELS*LH+15, BOT=2;
const RAINBOW=[0xff2222,0xff6600,0xffdd00,0x44ff44,0x22ddff,0x2266ff,0xaa22ff,0xff22cc];
const PCOLS=[0xff3333,0xff8800,0xffee00,0x44ff44,0x22ffcc,0x2266ff,0xbb33ff,0xff33bb,0xff6622,0x22ff88,0x88ff22,0x22aaff,0xff4488,0x44ffcc,0xff8844];

// ──────────────────────────────────────────────
// 固定レベルデータ (15 levels, increasing difficulty)
// hx/hz: 穴の中心 (XZ), hw: 穴の半辺長
// ──────────────────────────────────────────────
const FIXED_LEVELS = [
  // LV 1  大穴・中央 ─ チュートリアル
  {hx:  0.0, hz:  0.0, hw: 2.8},
  // LV 2  右にずれる
  {hx:  2.0, hz:  0.0, hw: 2.6},
  // LV 3  左奥
  {hx: -2.5, hz:  1.5, hw: 2.4},
  // LV 4  右手前
  {hx:  2.5, hz: -2.5, hw: 2.2},
  // LV 5  奥中央
  {hx:  0.0, hz:  3.5, hw: 2.0},
  // LV 6  左端
  {hx: -3.5, hz:  0.0, hw: 1.9},
  // LV 7  右奥
  {hx:  3.2, hz:  2.5, hw: 1.8},
  // LV 8  左手前
  {hx: -2.5, hz: -3.0, hw: 1.7},
  // LV 9  右端奥
  {hx:  4.0, hz:  3.0, hw: 1.6},
  // LV 10 左端手前
  {hx: -4.0, hz: -1.5, hw: 1.5},
  // LV 11 右端手前
  {hx:  3.8, hz: -3.5, hw: 1.5},
  // LV 12 正中央奥
  {hx:  0.0, hz: -4.5, hw: 1.4},
  // LV 13 右最端
  {hx:  4.5, hz:  0.0, hw: 1.4},
  // LV 14 左端奥・小さい
  {hx: -4.5, hz:  3.5, hw: 1.3},
  // LV 15 右奥・最難
  {hx:  3.5, hz: -4.5, hw: 1.2},
];

// ─── Settings state ───────────────────────────
let speedMult = 0.1;   // default ×0.10
let mapMode = 'fixed'; // 'fixed' | 'random'

window.setMapMode = function(mode){
  mapMode = mode;
  document.getElementById('btnFixed').style.border = mode==='fixed'?'1.5px solid #66aaff':'1px solid rgba(255,255,255,.2)';
  document.getElementById('btnFixed').style.background = mode==='fixed'?'#1a3060':'transparent';
  document.getElementById('btnFixed').style.color = mode==='fixed'?'#88ccff':'#aaa';
  document.getElementById('btnRandom').style.border = mode==='random'?'1.5px solid #66aaff':'1px solid rgba(255,255,255,.2)';
  document.getElementById('btnRandom').style.background = mode==='random'?'#1a3060':'transparent';
  document.getElementById('btnRandom').style.color = mode==='random'?'#88ccff':'#aaa';
};

const speedSlider = document.getElementById('speedSlider');
const speedLabel  = document.getElementById('speedLabel');
speedSlider.addEventListener('input', ()=>{
  speedMult = speedSlider.value / 100;
  speedLabel.textContent = '×' + speedMult.toFixed(2);
});

const setgear = document.getElementById('setgear');
const setpanel = document.getElementById('setpanel');
let panelOpen = false;
setgear.onclick = ()=>{
  panelOpen = !panelOpen;
  setpanel.style.display = panelOpen ? 'block' : 'none';
  setgear.style.background = panelOpen ? 'rgba(40,80,160,.7)' : 'rgba(0,0,0,.45)';
};

// ─── Shaft walls ──────────────────────────────
const SEG=8;
for(let i=0;i<=Math.ceil((TOP+25)/SEG);i++){
  const col=RAINBOW[i%RAINBOW.length];
  const m=new THREE.Mesh(
    new THREE.CylinderGeometry(SHAFT_R,SHAFT_R,SEG+.1,32,1,true),
    new THREE.MeshPhongMaterial({color:col,side:THREE.BackSide,emissive:col,emissiveIntensity:.18,shininess:15})
  );
  m.position.y=TOP+8-i*SEG; scene.add(m);
}

// Top dark cap
const topCap=new THREE.Mesh(new THREE.CircleGeometry(SHAFT_R-.1,32),new THREE.MeshBasicMaterial({color:0x111111}));
topCap.rotation.x=Math.PI/2; topCap.position.y=TOP+10; scene.add(topCap);

// Bottom landing
const landMesh=new THREE.Mesh(new THREE.CircleGeometry(SHAFT_R-.3,32),new THREE.MeshPhongMaterial({color:0x22cc44,emissive:0x114422}));
landMesh.rotation.x=-Math.PI/2; landMesh.position.y=.5; scene.add(landMesh);
const goalRing=new THREE.Mesh(new THREE.TorusGeometry(4,.3,8,32),new THREE.MeshPhongMaterial({color:0xffff00,emissive:0x888800}));
goalRing.rotation.x=Math.PI/2; goalRing.position.y=1.2; scene.add(goalRing);
const starMat=new THREE.MeshBasicMaterial({color:0xffff00});
for(let i=0;i<6;i++){
  const a=(i/6)*Math.PI*2;
  const s=new THREE.Mesh(new THREE.BoxGeometry(.25,.25,.25),starMat);
  s.position.set(Math.cos(a)*4,1.2,Math.sin(a)*4); scene.add(s);
}

const platforms=[];

function makePlatform(level){
  const y=TOP-15-level*LH;
  const R=SHAFT_R-.25;

  let hx, hz, hw;
  if(mapMode==='fixed'){
    const def = FIXED_LEVELS[level] || FIXED_LEVELS[FIXED_LEVELS.length-1];
    hx=def.hx; hz=def.hz; hw=def.hw;
  } else {
    hw=Math.max(1.2, 3.5-level*.15);
    const maxOff=SHAFT_R-hw-1.6;
    hx=(Math.random()-.5)*2*maxOff;
    hz=(Math.random()-.5)*2*maxOff;
  }

  const outerPts=[];
  for(let i=0;i<72;i++){
    const a=(i/72)*Math.PI*2;
    outerPts.push(new THREE.Vector2(R*Math.cos(a),R*Math.sin(a)));
  }
  const shape=new THREE.Shape(outerPts);
  const holePath=new THREE.Path();
  holePath.setFromPoints([
    new THREE.Vector2(hx-hw,hz-hw),
    new THREE.Vector2(hx-hw,hz+hw),
    new THREE.Vector2(hx+hw,hz+hw),
    new THREE.Vector2(hx+hw,hz-hw)
  ]);
  shape.holes.push(holePath);

  const col=PCOLS[level%PCOLS.length];
  const platMesh=new THREE.Mesh(
    new THREE.ShapeGeometry(shape,64),
    new THREE.MeshPhongMaterial({color:col,side:THREE.DoubleSide,shininess:60})
  );
  platMesh.rotation.x=Math.PI/2; platMesh.position.y=y; scene.add(platMesh);

  const crossG=new THREE.Group();
  crossG.position.set(hx,y+.25,hz);
  const cm=new THREE.MeshBasicMaterial({color:0xffff00});
  const hs=hw*2;
  crossG.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(hs+.6,.1,.2),cm),{}));
  crossG.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.2,.1,hs+.6),cm),{}));
  [[-1,-1],[1,-1],[1,1],[-1,1]].forEach(([sx,sz])=>{
    const d=new THREE.Mesh(new THREE.BoxGeometry(.3,.1,.3),cm);
    d.position.set(sx*hw,0,sz*hw); crossG.add(d);
  });
  scene.add(crossG);

  const rimMesh=new THREE.Mesh(
    new THREE.TorusGeometry(R,.22,6,48),
    new THREE.MeshPhongMaterial({color:col,emissive:col,emissiveIntensity:.25})
  );
  rimMesh.rotation.x=Math.PI/2; rimMesh.position.y=y; scene.add(rimMesh);

  // Level number badge on platform
  const badgeGeo=new THREE.BoxGeometry(.6,.15,.6);
  const badgeMat=new THREE.MeshBasicMaterial({color:0xffffff});
  const badge=new THREE.Mesh(badgeGeo,badgeMat);
  badge.position.set(hx+hw+.8, y+.1, hz); scene.add(badge);

  platforms.push({y,hx,hz,hw,mesh:platMesh,cross:crossG,rim:rimMesh,badge,level,passed:false});
}

for(let i=0;i<LEVELS;i++) makePlatform(i);

// ─── Player ───────────────────────────────────
const pG=new THREE.Group();
pG.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(.7,1.,.4),new THREE.MeshPhongMaterial({color:0xff4422})),{}));
const hm=new THREE.Mesh(new THREE.SphereGeometry(.28,8,8),new THREE.MeshPhongMaterial({color:0xffcc88}));
hm.position.y=.75; pG.add(hm);
const helm=new THREE.Mesh(new THREE.SphereGeometry(.31,8,8,0,Math.PI*2,0,Math.PI/1.7),new THREE.MeshPhongMaterial({color:0x2244cc}));
helm.position.y=.82; pG.add(helm);
[-1,1].forEach(s=>{
  const arm=new THREE.Mesh(new THREE.BoxGeometry(.22,.65,.22),new THREE.MeshPhongMaterial({color:0xff4422}));
  arm.position.set(s*.46,.1,0); arm.rotation.z=s*.55; pG.add(arm);
});
pG.position.set(0,TOP+2,0); scene.add(pG);

// ─── Speed lines ──────────────────────────────
const sLines=[];
for(let i=0;i<22;i++){
  const ln=new THREE.Line(
    new THREE.BufferGeometry().setFromPoints([new THREE.Vector3(0,-1,0),new THREE.Vector3(0,1+Math.random()*2.5,0)]),
    new THREE.LineBasicMaterial({color:0x99ccff,transparent:true,opacity:0})
  );
  sLines.push({mesh:ln,ox:(Math.random()-.5)*9,oz:(Math.random()-.5)*9});
  scene.add(ln);
}

// ─── Input ────────────────────────────────────
let gs='menu', vel={x:0,y:0,z:0}, T=0, gsc=0;
const keys={};
document.addEventListener('keydown',e=>{
  keys[e.code]=true;
  ['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)&&e.preventDefault();
});
document.addEventListener('keyup',e=>{keys[e.code]=false;});
wrap.addEventListener('touchmove',e=>{
  const r=wrap.getBoundingClientRect();
  const dx=e.touches[0].clientX-(r.left+W/2), dz=e.touches[0].clientY-(r.top+H/2);
  keys['TL']=dx<-20; keys['TR']=dx>20; keys['TF']=dz<-20; keys['TB']=dz>20;
},{passive:true});
wrap.addEventListener('touchend',()=>{keys['TL']=keys['TR']=keys['TF']=keys['TB']=false;},{passive:true});

// ─── Game lifecycle ───────────────────────────
function resetPlatforms(){
  platforms.forEach(p=>{
    scene.remove(p.mesh);scene.remove(p.cross);scene.remove(p.rim);scene.remove(p.badge);
  });
  platforms.length=0;
  for(let i=0;i<LEVELS;i++) makePlatform(i);
}

function showHUD(on){
  document.getElementById('hud').style.display=on?'block':'none';
  document.getElementById('scd').style.display=on?'block':'none';
  if(!on){setpanel.style.display='none'; panelOpen=false; setgear.style.background='rgba(0,0,0,.45)';}
}

let countdownVal = 0;
const cdov  = document.getElementById('cdov');
const cdnum = document.getElementById('cdnum');

function startGame(){
  document.getElementById('ov').style.display='none';
  showHUD(true);
  resetPlatforms();
  pG.position.set(0,TOP+2,0);
  pG.rotation.set(0,0,0); pG.visible=true;
  pG.traverse(m=>{if(m.isMesh&&m.material)m.material.color.set(m.userData.origCol||m.material.color);});
  vel={x:0,y:0,z:0}; T=0; gsc=0;
  document.getElementById('lvl').textContent='0';
  document.getElementById('scv').textContent='0';
  // Start countdown
  countdownVal = 3;
  cdov.style.display='flex';
  cdnum.style.opacity='1';
  cdnum.textContent = countdownVal;
  gs='countdown';
}
document.getElementById('btn').onclick=startGame;
window.startGame=startGame;

// ─── Update loop ──────────────────────────────
function update(dt){
  if(gs==='countdown'){
    countdownVal -= dt;
    const n = Math.ceil(countdownVal);
    cdnum.textContent = n > 0 ? n : 'GO！';
    cdnum.style.transform = `scale(${1 + (countdownVal % 1) * 0.4})`;
    if(countdownVal <= -0.5){
      cdov.style.display='none';
      vel={x:0,y:-.05,z:0};
      gs='playing';
    }
    goalRing.rotation.z+=.04*dt*60;
    return;
  }
  if(gs!=='playing')return;
  T+=dt;

  const mx=((keys['ArrowRight']||keys['KeyD']||keys['TR'])?1:0)-((keys['ArrowLeft']||keys['KeyA']||keys['TL'])?1:0);
  const mz=((keys['ArrowDown']||keys['KeyS']||keys['TB'])?1:0)-((keys['ArrowUp']||keys['KeyW']||keys['TF'])?1:0);
  vel.x+=(mx*.17-vel.x)*.2;
  vel.z+=(mz*.17-vel.z)*.2;

  const gravity = 0.028 * speedMult;
  const maxFall = 3.2  * speedMult;
  vel.y -= gravity * dt * 60;
  vel.y  = Math.max(vel.y, -maxFall);

  const prevY=pG.position.y;
  pG.position.x+=vel.x;
  pG.position.y+=vel.y;
  pG.position.z+=vel.z;

  // Shaft boundary
  const rr=pG.position.x**2+pG.position.z**2;
  const maxR=SHAFT_R-1.1;
  if(rr>maxR*maxR){
    const r=Math.sqrt(rr);
    const nx=pG.position.x/r, nz=pG.position.z/r;
    pG.position.x=nx*maxR; pG.position.z=nz*maxR;
    const vn=vel.x*nx+vel.z*nz;
    vel.x-=vn*nx*1.8; vel.z-=vn*nz*1.8;
  }

  pG.rotation.z=THREE.MathUtils.lerp(pG.rotation.z,-mx*.45,.12);
  pG.rotation.x=THREE.MathUtils.lerp(pG.rotation.x, mz*.3,.12);

  // Speed lines
  const sf=Math.abs(vel.y)/maxFall;
  sLines.forEach(s=>{
    s.mesh.position.set(pG.position.x+s.ox,pG.position.y+2.5,pG.position.z+s.oz);
    s.mesh.material.opacity=sf*.55;
    s.mesh.scale.y=.3+sf*4.5;
  });

  goalRing.rotation.z+=.04*dt*60;

  // Platform collision
  for(const p of platforms){
    if(p.passed)continue;
    if(prevY>=p.y && pG.position.y<p.y){
      const inHole=Math.abs(pG.position.x-p.hx)<p.hw*1.08 &&
                   Math.abs(pG.position.z-p.hz)<p.hw*1.08;
      if(!inHole){
        pG.traverse(m=>{if(m.isMesh)m.material.color.set(0xffffff);});
        endGame(false); return;
      }
      p.passed=true;
      p.cross.visible=false;
      p.mesh.material.transparent=true; p.mesh.material.opacity=.2;
      p.rim.material.transparent=true;  p.rim.material.opacity=.15;
      // Score: base + speed bonus + remaining hole size bonus
      const speedBonus = Math.round(speedMult * 80);
      const sizeBonus  = Math.round((2.8-p.hw)*30);
      gsc += 100 + (LEVELS-p.level)*5 + speedBonus + sizeBonus;
      document.getElementById('lvl').textContent=platforms.filter(x=>x.passed).length;
      document.getElementById('scv').textContent=gsc;
    }
  }

  // Next hole highlight pulse
  const next=platforms.find(p=>!p.passed);
  platforms.forEach(p=>{
    if(!p.passed && p.cross.visible){
      const isNext=(p===next);
      const pulse=isNext?(Math.sin(T*8)*.5+.5):0;
      p.cross.children.forEach(c=>{if(c.material) c.material.color.setHSL(.17,1,.5+pulse*.45);});
    }
  });

  if(pG.position.y<=BOT){ endGame(true); return; }

  // Camera
  const tcx=pG.position.x*.25, tcy=pG.position.y+8, tcz=pG.position.z+8;
  cam.position.x+=(tcx-cam.position.x)*.1;
  cam.position.y+=(tcy-cam.position.y)*.1;
  cam.position.z+=(tcz-cam.position.z)*.1;
  cam.lookAt(pG.position.x,pG.position.y-5,pG.position.z);
}

function endGame(win){
  gs=win?'win':'over'; pG.visible=true;
  cdov.style.display='none';
  showHUD(false);
  const passed=platforms.filter(p=>p.passed).length;
  const ov=document.getElementById('ov');
  ov.style.display='flex';
  ov.innerHTML=`
    <div style="font-size:24px;font-weight:500;margin-bottom:10px;color:${win?'#66ff88':'#ff6666'}">${win?'🎉 CLEAR！':'💥 激突…'}</div>
    <div style="font-size:14px;color:#aabbcc;margin-bottom:6px;">${win?`スコア: ${gsc} 点`:'プラットフォームに激突した！'}</div>
    <div style="font-size:12px;color:#556;margin-bottom:20px;">通過レベル: ${passed} / ${LEVELS}　速度: ×${speedMult.toFixed(2)}</div>
    <button id="rbtn" style="padding:10px 32px;font-size:14px;cursor:pointer;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.5);color:#fff;border-radius:8px;letter-spacing:1px;">もう一度</button>`;
  document.getElementById('rbtn').onclick=startGame;
}

// ─── Idle camera (menu/result) ────────────────
cam.position.set(6,TOP-25,14);
cam.lookAt(0,TOP-45,0);

let lastT=0;
function loop(now){
  requestAnimationFrame(loop);
  const dt=Math.min((now-lastT)/1000,.05);
  lastT=now;
  if(gs==='playing' || gs==='countdown'){
    update(dt);
  } else {
    const t=now*.0004;
    cam.position.x=Math.sin(t)*7;
    cam.position.z=Math.cos(t)*7+10;
    cam.position.y=TOP-20+Math.sin(t*.6)*15;
    cam.lookAt(0,cam.position.y-25,0);
  }
  renderer.render(scene,cam);
}
requestAnimationFrame(loop);
})();
</script>
